{% extends "base.html" %}

{% block head %}
<script>const GOOGLE_MAPS_API_KEY = "{{ google_maps_api_key }}";</script>
<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
<style>
/* ── Full-screen map layout ───────────────────────────────────────────── */
main.container { padding: 0 !important; overflow: hidden; }
.map-full {
    position: relative;
    flex: 1;
    overflow: hidden;
    min-height: 0;
    /* Fallback explicit height so height:100% resolves inside flex */
    height: calc(100vh - 56px);
}
/* Google Maps needs position:absolute to reliably fill a flex container */
#map {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
}

/* ── Floating control bar ─────────────────────────────────────────────── */
.map-controls {
    position:absolute; top:12px; left:12px; right:12px; z-index:15;
    display:flex; gap:8px; align-items:flex-start; pointer-events:none;
    transition: left 0.27s cubic-bezier(.4,0,.2,1);
}
.map-controls.drawer-open { left: calc(380px + 16px); }
.map-controls > * { pointer-events:all; }

.ctrl-btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:0.45rem 0.9rem; border:none; border-radius:20px;
    font-size:0.82rem; font-weight:600; cursor:pointer; white-space:nowrap;
    backdrop-filter:blur(12px); transition:transform .15s, box-shadow .15s;
    box-shadow:0 2px 8px rgba(0,0,0,.35);
}
.ctrl-btn:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,.45); }
.ctrl-btn.dark    { background:rgba(15,23,42,.9);  color:#e2e8f0; }
.ctrl-btn.primary { background:rgba(79,70,229,.92); color:#fff; }
.ctrl-btn.success { background:rgba(16,185,129,.92); color:#fff; }
.ctrl-btn.active  { background:rgba(251,191,36,.92); color:#0f172a; }

/* ── Category dropdown ────────────────────────────────────────────────── */
.cat-wrap { position:relative; }
#cat-dropdown {
    position:absolute; top:calc(100% + 6px); left:0;
    min-width:260px; background:rgba(10,15,28,.97);
    border:1px solid rgba(255,255,255,.12); border-radius:14px;
    box-shadow:0 8px 32px rgba(0,0,0,.55); backdrop-filter:blur(20px);
    padding:.5rem 0; z-index:60; display:none;
}
#cat-dropdown.open { display:block; }
.cat-row {
    display:flex; align-items:center; gap:8px;
    padding:.42rem 1rem; transition:background .1s; cursor:default;
}
.cat-row:hover { background:rgba(255,255,255,.05); }
.cat-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.cat-label { flex:1; font-size:.83rem; color:#e2e8f0; }
.cat-count { font-size:.72rem; color:#475569; min-width:24px; text-align:right; }
.cat-eye {
    width:28px; height:28px; border:none; background:transparent;
    cursor:pointer; color:#94a3b8; display:flex; align-items:center;
    justify-content:center; border-radius:6px; transition:background .1s, color .1s;
}
.cat-eye:hover { background:rgba(255,255,255,.09); color:#e2e8f0; }
.cat-sync {
    font-size:.68rem; padding:2px 7px; border:1px solid rgba(99,102,241,.5);
    background:rgba(99,102,241,.15); color:#a5b4fc; border-radius:10px;
    cursor:pointer; transition:background .12s;
}
.cat-sync:hover { background:rgba(99,102,241,.35); }
.cat-divider { height:1px; background:rgba(255,255,255,.07); margin:.35rem 0; }

/* ── Route badge ──────────────────────────────────────────────────────── */
#route-badge { display:none; position:relative; }
.rbadge-count {
    position:absolute; top:-7px; right:-7px;
    background:#ef4444; color:#fff; border-radius:50%;
    width:18px; height:18px; font-size:.62rem; font-weight:700;
    display:flex; align-items:center; justify-content:center;
}

/* ── Record list drawer ───────────────────────────────────────────────── */
#list-drawer {
    position:absolute; top:0; bottom:0; left:0;
    width:min(380px,100vw); z-index:30;
    background:rgba(10,15,28,.97); backdrop-filter:blur(20px);
    border-right:1px solid rgba(255,255,255,.09);
    display:flex; flex-direction:column;
    transform:translateX(-100%);
    transition:transform .27s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 24px rgba(0,0,0,.45);
}
#list-drawer.open { transform:translateX(0); }

.drawer-head {
    display:flex; align-items:center; gap:10px;
    padding:.85rem 1rem .65rem; border-bottom:1px solid rgba(255,255,255,.08);
    flex-shrink:0;
}
.drawer-head h3 { margin:0; flex:1; font-size:.93rem; color:#e2e8f0; }
.drawer-close {
    background:none; border:none; cursor:pointer; color:#64748b;
    display:flex; align-items:center; gap:4px; font-size:.8rem; padding:0;
}
.drawer-search {
    padding:.5rem .75rem; flex-shrink:0;
}
.drawer-search input {
    width:100%; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
    border-radius:8px; padding:.4rem .7rem; color:#e2e8f0; font-size:.82rem;
}
.drawer-search input::placeholder { color:#475569; }

.record-scroll { flex:1; overflow-y:auto; padding:.4rem .5rem; }
.record-card {
    display:flex; gap:9px; padding:.6rem .7rem; border-radius:9px;
    cursor:pointer; margin-bottom:3px; border:1px solid transparent;
    transition:background .12s, border-color .12s;
}
.record-card:hover { background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.1); }
.record-card.active { background:rgba(79,70,229,.18); border-color:rgba(99,102,241,.5); }
.rc-bar { width:4px; border-radius:4px; flex-shrink:0; align-self:stretch; }
.rc-body { flex:1; min-width:0; }
.rc-name { font-size:.83rem; font-weight:600; color:#e2e8f0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rc-module { font-size:.7rem; color:#475569; margin-bottom:1px; }
.rc-fields { font-size:.73rem; color:#94a3b8; }

/* ── Route panel ──────────────────────────────────────────────────────── */
#route-panel {
    position:absolute; bottom:20px; right:16px;
    width:min(310px,calc(100vw - 32px)); z-index:25;
    background:rgba(10,15,28,.97); backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1); border-radius:16px;
    box-shadow:0 8px 32px rgba(0,0,0,.55);
    display:none; flex-direction:column;
}
#route-panel.open { display:flex; }
.rp-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:.7rem 1rem .5rem; border-bottom:1px solid rgba(255,255,255,.08);
}
.rp-title { font-size:.88rem; font-weight:600; color:#e2e8f0; }
.rp-close { background:none; border:none; cursor:pointer; color:#64748b; padding:2px; display:flex; }
.rp-stops { padding:.4rem .5rem; max-height:230px; overflow-y:auto; }
.rp-foot { padding:.4rem .6rem .65rem; display:flex; gap:8px; }

/* ── Search this area ─────────────────────────────────────────────────── */
#search-area-btn {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    z-index:15; display:none;
}

/* ── Sync status toast ────────────────────────────────────────────────── */
#sync-toast {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    z-index:20; font-size:.75rem; color:#10b981;
    background:rgba(10,15,28,.9); padding:4px 14px; border-radius:12px;
    display:none; backdrop-filter:blur(8px); white-space:nowrap;
}

/* ── Mobile ───────────────────────────────────────────────────────────── */
@media (max-width:600px) {
    .map-controls { top:8px; left:8px; right:8px; flex-wrap:wrap; }
    .map-controls.drawer-open { left: 8px; } /* full-width drawer on mobile — don't shift */
    .ctrl-btn { padding:.38rem .7rem; font-size:.76rem; }
    #route-panel { bottom:0; right:0; left:0; width:100%; border-radius:16px 16px 0 0; }
    #search-area-btn { top:60px; }
}
</style>
{% endblock %}

{% block content %}
<div class="map-full">

    <div id="map"></div>

    <!-- ── Floating controls ── -->
    <div class="map-controls">
        <!-- Show list -->
        <button class="ctrl-btn dark" id="show-list-btn" onclick="toggleListDrawer()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            Show list
        </button>

        <!-- Category filter -->
        <div class="cat-wrap">
            <button class="ctrl-btn dark" id="cat-btn" onclick="toggleCatDropdown(event)">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2V12.46L22 3z"/></svg>
                Category
                <svg id="cat-caret" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform .2s;"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div id="cat-dropdown">
                <div class="cat-row" style="padding-bottom:.3rem;">
                    <span style="font-size:.72rem; color:#475569; text-transform:uppercase; letter-spacing:.06em;">Modules</span>
                    <span style="flex:1;"></span>
                    <button class="cat-sync" onclick="syncAllMyData()">Sync All</button>
                </div>
                <div id="cat-list"><!-- populated by updateLegend --></div>
                <div class="cat-divider"></div>
                <div class="cat-row" onclick="resetAllVisibility()" style="cursor:pointer;">
                    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span class="cat-label" style="color:#94a3b8; font-size:.8rem;">Show All</span>
                </div>
            </div>
        </div>

        <!-- Route badge (hidden until first stop added) -->
        <div id="route-badge" class="ctrl-btn success" onclick="toggleRoutePanel()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="19" cy="19" r="2"/><path d="M7 12h8m0-7-2 7 2 7"/></svg>
            Route
            <span class="rbadge-count" id="route-badge-count">0</span>
        </div>

        <!-- Toggle Google POIs button -->
        <button class="ctrl-btn dark" id="poi-toggle-btn" onclick="toggleGooglePOIs()"
                title="Hide Points of Interest (POIs)" style="padding:0.45rem 0.65rem;">
            🏛️
        </button>

        <!-- Toggle Map/Satellite view -->
        <button class="ctrl-btn dark" id="map-type-btn" onclick="toggleMapType()"
                title="Switch to Satellite view" style="padding:0.45rem 0.65rem;">
            🛰️
        </button>
    </div>

    <!-- Search this area button (centred, shown after pan/zoom) -->
    <button class="ctrl-btn primary" id="search-area-btn" onclick="searchArea()">Search in this area</button>

    <!-- ── Record list drawer ── -->
    <div id="list-drawer">
        <div class="drawer-head">
            <button class="drawer-close" onclick="toggleListDrawer()">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                Hide
            </button>
            <h3>Records <span id="list-count" style="color:#475569; font-weight:400; font-size:.8rem;"></span></h3>
        </div>
        <div class="drawer-search">
            <input type="text" id="list-search" placeholder="Filter records…" oninput="filterRecordList(this.value)">
        </div>
        <div class="record-scroll" id="record-scroll">
            <div style="padding:1rem; color:#475569; font-size:.85rem; text-align:center;">Loading…</div>
        </div>
    </div>

    <!-- ── Route panel (bottom-right floating card) ── -->
    <div id="route-panel">
        <div class="rp-head">
            <span class="rp-title">Route Planner</span>
            <div style="display:flex; gap:8px; align-items:center;">
                <span id="route-stats" style="font-size:.74rem; color:#64748b;">0 stops</span>

                   background:rgba(15,23,42,.88); color:#94a3b8;
                   display:flex; align-items:center; justify-content:center;
                   box-shadow:0 2px 8px rgba(0,0,0,.4); backdrop-filter:blur(8px);
                   transition:background .2s, color .2s;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
    </button>
    {% endif %}

    <!-- Call Selector Modal -->
    <div class="call-modal-overlay" id="call-modal-overlay">
        <div class="call-modal-dialog">
            <div class="call-modal-header">
                <div class="call-modal-title" id="call-modal-title">Call Contact</div>
                <button class="call-modal-close" onclick="closeCallModal()">✕</button>
            </div>
            <div class="call-modal-body" id="call-modal-body">
                <!-- Dynamically populated buttons -->
            </div>
        </div>
    </div>

</div><!-- end .map-full -->

{% if is_admin %}
<div class="debug-console" id="debug-console" style="display:none;">
    <div class="console-header">
        <div style="display:flex; align-items:center; gap:8px;">
            <span class="pulse-dot" style="width:6px;height:6px;margin:0;"></span>
            <span>Server Output</span>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="console-copy-btn" onclick="clearLogs()" title="Clear console">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Clear
            </button>
            <button class="console-copy-btn" onclick="copyLogs()" title="Copy">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy
            </button>
            <button class="console-copy-btn" onclick="toggleConsoleVisibility()" title="Hide console">✕</button>
        </div>
    </div>
    <div class="console-body" id="console-body"><div>Connected to logs...</div></div>
</div>
<script>
    const CONSOLE_KEY = 'zohomap_console_visible';
    function toggleConsoleVisibility() {
        const el = document.getElementById('debug-console');
        const fab = document.getElementById('console-toggle-fab');
        const isNowVisible = el.style.display === 'none';
        el.style.display = isNowVisible ? 'block' : 'none';
        if (fab) {
            fab.style.background = isNowVisible ? 'rgba(79,70,229,.9)' : 'rgba(15,23,42,.88)';
            fab.style.color = isNowVisible ? '#fff' : '#94a3b8';
        }
        localStorage.setItem(CONSOLE_KEY, isNowVisible ? '1' : '0');
        if (isNowVisible) pollLogs();
    }
    (function() { if (localStorage.getItem(CONSOLE_KEY) === '1') toggleConsoleVisibility(); })();

    let _pausePolling = false;
    async function clearLogs() {
        const cb = document.getElementById('console-body');
        cb.innerHTML = '<div style="color:#94a3b8;">Clearing...</div>';
        try {
            const res = await fetch('/api/logs/clear', {method:'POST'});
            if (res.ok) {
                cb.innerHTML = '<div style="color:#10b981;">✓ Logs cleared.</div>';
                _pausePolling = true;
                setTimeout(() => { _pausePolling = false; }, 4000);
            } else {
                const err = await res.json().catch(() => ({}));
                cb.innerHTML = `<div style="color:#ef4444;">✗ Clear failed (HTTP ${res.status}): ${err.error || 'Unknown error'}</div>`;
            }
        } catch(e) { cb.innerHTML = `<div style="color:#ef4444;">✗ Network error: ${e.message}</div>`; }
    }
    function copyLogs() {
        const body = document.getElementById('console-body');
        const text = Array.from(body.querySelectorAll('div')).map(d => d.textContent).join('\n');
        if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(text);
        else { const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.left='-9999px'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
    }
    function pollLogs() {
        const el = document.getElementById('debug-console');
        if (!el || el.style.display === 'none' || _pausePolling) return;
        fetch('/api/logs').then(r=>r.json()).then(data=>{
            if(data.logs && data.logs.length > 0){
                const cb = document.getElementById('console-body');
                cb.innerHTML='';
                data.logs.forEach(line=>{ const d=document.createElement('div'); d.textContent=line; cb.appendChild(d); });
                cb.scrollTop=cb.scrollHeight;
            }
        }).catch(()=>{});
    }
    setInterval(pollLogs, 2000);
</script>
{% endif %}

<script>
// ── Overlay UI controllers ────────────────────────────────────────────────

// Category dropdown
function toggleCatDropdown(e) {
    e.stopPropagation();
    const dd = document.getElementById('cat-dropdown');
    const caret = document.getElementById('cat-caret');
    const open = dd.classList.toggle('open');
    if (caret) caret.style.transform = open ? 'rotate(180deg)' : '';
}
document.addEventListener('click', () => {
    document.getElementById('cat-dropdown')?.classList.remove('open');
    const caret = document.getElementById('cat-caret');
    if (caret) caret.style.transform = '';
});

function resetAllVisibility() {
    window.hiddenModules = new Set();
    if (window.lastMapData) {
        window.plotData(window.lastMapData);
        window.updateLegend(window.lastMapData);
        if (window.updateRecordList) window.updateRecordList(window.lastMapData);
    }
    document.getElementById('cat-dropdown')?.classList.remove('open');
}

// Record list drawer
let _listData = [];

function _geoDistRad(lat1, lng1, lat2, lng2) {
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); // radians
}
function _milesBetween(lat1, lng1, lat2, lng2) {
    return _geoDistRad(lat1, lng1, lat2, lng2) * 3958.8; // earth radius in miles
}

function toggleListDrawer() {
    const drawer = document.getElementById('list-drawer');
    const controls = document.querySelector('.map-controls');
    const isOpen = drawer.classList.toggle('open');
    if (controls) controls.classList.toggle('drawer-open', isOpen);
    document.getElementById('show-list-btn').innerHTML = isOpen
        ? '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Hide list'
        : '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> Show list';
}
// Expose for inline onclick attributes
window.toggleListDrawer = toggleListDrawer;

window.updateRecordList = function(data) {
    const visibleData = data.filter(item => !(window.hiddenModules && window.hiddenModules.has(item.module)));
    _listData = visibleData;
    _renderSortedList();
};

function _renderSortedList() {
    const sorted = [..._listData];
    if (window.userLat != null && window.userLng != null) {
        sorted.sort((a, b) =>
            _geoDistRad(a.lat, a.lng, window.userLat, window.userLng) -
            _geoDistRad(b.lat, b.lng, window.userLat, window.userLng)
        );
    }
    renderRecordList(sorted);
}

function renderRecordList(data) {
    const scroll = document.getElementById('record-scroll');
    const countEl = document.getElementById('list-count');
    if (!scroll) return;
    countEl.textContent = `(${data.length})`;
    if (data.length === 0) {
        scroll.innerHTML = '<div style="padding:1.5rem; color:#475569; font-size:.85rem; text-align:center;">No records in this area</div>';
        return;
    }
    scroll.innerHTML = '';

    data.forEach(item => {
        const wrapper = document.createElement('div');
        wrapper.style.marginBottom = '3px';

        // Distance label
        let distLabel = '';
        if (window.userLat != null && window.userLng != null) {
            const mi = _milesBetween(item.lat, item.lng, window.userLat, window.userLng);
            distLabel = mi < 10 ? `${mi.toFixed(1)} mi` : `${Math.round(mi)} mi`;
        }

        // Preview fields (first 2 non-system fields)
        const previewFields = Object.entries(item.record_data || {})
            .filter(([k]) => !k.startsWith('_') && k !== 'Latitude' && k !== 'Longitude' && k !== 'Address')
            .slice(0, 2)
            .map(([k, v]) => `<span style="color:#64748b;">${k}:</span> ${v}`)
            .join(' &middot; ');

        // Card (collapsed header)
        const card = document.createElement('div');
        card.className = 'record-card';
        card.style.cursor = 'pointer';
        card.innerHTML = `
            <div class="rc-bar" style="background:${item.color};"></div>
            <div class="rc-body" style="min-width:0;">
                <div class="rc-module">${item.module}${distLabel ? ` &middot; <span style="color:#6366f1;font-weight:600;">${distLabel}</span>` : ''}</div>
                <div class="rc-name">${item.name}</div>
                ${previewFields ? `<div class="rc-fields" style="font-size:.71rem;">${previewFields}</div>` : ''}
            </div>
            <svg class="rc-chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#475569" stroke-width="2.5" style="flex-shrink:0;transition:transform .2s;"><polyline points="6 9 12 15 18 9"/></svg>`;

        // Detail panel (hidden by default)
        const detail = document.createElement('div');
        detail.style.cssText = 'display:none; padding:.65rem .75rem; background:rgba(255,255,255,.04); border-radius:0 0 9px 9px; border:1px solid rgba(255,255,255,.08); border-top:none; margin-top:-2px;';
        detail.innerHTML = _buildListDetail(item);

        card.addEventListener('click', (e) => {
            // Don't re-toggle if a button inside the detail was clicked
            if (e.target.closest('button')) return;
            const isOpen = detail.style.display !== 'none';
            // Collapse siblings
            scroll.querySelectorAll('.rc-detail-panel').forEach(d => d.style.display = 'none');
            scroll.querySelectorAll('.rc-chevron').forEach(c => c.style.transform = '');
            scroll.querySelectorAll('.record-card').forEach(c => c.classList.remove('active'));
            scroll.querySelectorAll('.record-card').forEach(c => c.style.borderRadius = '9px');
            if (!isOpen) {
                detail.style.display = 'block';
                card.querySelector('.rc-chevron').style.transform = 'rotate(180deg)';
                card.classList.add('active');
                card.style.borderRadius = '9px 9px 0 0';
            }
        });

        detail.className = 'rc-detail-panel';
        wrapper.appendChild(card);
        wrapper.appendChild(detail);
        scroll.appendChild(wrapper);
    });
}

function _buildListDetail(item) {
    const addressKeys = ['Address', 'City', 'State', 'Zip', 'Country', 'Latitude', 'Longitude'];
    let html = '';

    // Location fields
    const addrPairs = addressKeys.filter(k => item.record_data[k]);
    if (addrPairs.length) {
        html += `<div style="font-size:.68rem;color:#64748b;text-transform:uppercase;font-weight:600;letter-spacing:.05em;margin-bottom:5px;">Location</div>`;
        addrPairs.forEach(k => {
            html += `<div style="font-size:.77rem;margin-bottom:2px;color:#cbd5e1;"><span style="color:#94a3b8;">${k}:</span> ${item.record_data[k]}</div>`;
        });
    }

    // Additional fields
    const addPairs = Object.keys(item.record_data)
        .filter(k => !addressKeys.includes(k) && !k.startsWith('_') && item.record_data[k])
        .sort();
    if (addPairs.length) {
        html += `<div style="font-size:.68rem;color:#64748b;text-transform:uppercase;font-weight:600;letter-spacing:.05em;margin:8px 0 5px;">Details</div>`;
        addPairs.forEach(k => {
            html += `<div style="font-size:.77rem;margin-bottom:2px;color:#cbd5e1;"><span style="color:#94a3b8;">${k}:</span> ${item.record_data[k]}</div>`;
        });
    }

    // Action buttons
    const safeName = item.name.replace(/'/g, '&apos;').replace(/"/g, '&quot;');
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const zohoAppLink = `zohocrm://crm/${encodeURIComponent(item.api_module_name || item.module)}/${item.id}`;

    // Extract phone fields
    const phoneFields = [];
    Object.entries(item.record_data || {}).forEach(([key, val]) => {
        if (!addressKeys.includes(key) && !key.startsWith('_') && val) {
            const lowerKey = key.toLowerCase();
            if (lowerKey.includes('phone') || lowerKey.includes('mobile')) {
                phoneFields.push({ label: key, value: String(val).trim() });
            }
        }
    });

    const phoneFieldsJson = JSON.stringify(phoneFields).replace(/"/g, '&quot;');
    const callButtonHtml = phoneFields.length > 0 ? `
        <button class="btn-primary" style="font-size:.73rem;padding:.35rem;grid-column:span 2;background-color:#10b981;box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);"
            onclick="window.makePhoneCall('${safeName}', '${phoneFieldsJson}')">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:2px;vertical-align:middle;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            Call Contact
        </button>
    ` : '';

    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:10px;">
        ${callButtonHtml}
        <button class="btn-primary" style="font-size:.73rem;padding:.35rem;grid-column:span 2;"
            onclick="window.focusMapMarker('${item.id}'); if(window.innerWidth<=600) window.toggleListDrawer();">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Show on Map
        </button>
        <button class="btn-secondary" style="font-size:.73rem;padding:.35rem;color:#fff;"
            onclick="window.getDirections(${item.lat},${item.lng})">Directions</button>
        <button class="btn-secondary" style="font-size:.73rem;padding:.35rem;color:#fff;"
            onclick="window.open('${item.zoho_link}','_blank')">Open in Zoho</button>
        <button class="btn-secondary" style="font-size:.73rem;padding:.35rem;color:#fff;"
            onclick="window.addToRoute('${item.id}','${safeName}',${item.lat},${item.lng})">Add to Route</button>
        <button class="btn-secondary" style="font-size:.73rem;padding:.35rem;color:#fff;display:flex;align-items:center;justify-content:center;gap:4px;"
            onclick="window.syncSingleRecord('${item.api_module_name||item.module}','${item.id}',this)">
            <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 2.13-5.88L2 10"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 1 0-2.13 5.88l3.13-3.88"/></svg>
            Sync
        </button>
        ${isMobile ? `<button class="btn-primary" style="font-size:.73rem;padding:.35rem;grid-column:span 2;" onclick="window.location.href='${zohoAppLink}'">Open in App</button>` : ''}
    </div>`;

    return html;
}

function filterRecordList(query) {
    if (!query) { _renderSortedList(); return; }
    const q = query.toLowerCase();
    renderRecordList(_listData.filter(d =>
        d.name.toLowerCase().includes(q) || d.module.toLowerCase().includes(q)
    ));
}


// Route panel
function toggleRoutePanel() {
    document.getElementById('route-panel').classList.toggle('open');
}

// updateRouteBadge — called from map.js renderRoutePlanner
window.updateRouteBadge = function(count) {
    const badge = document.getElementById('route-badge');
    const countEl = document.getElementById('route-badge-count');
    const panel = document.getElementById('route-panel');
    if (count > 0) {
        badge.style.display = 'inline-flex';
        countEl.textContent = count;
        // Auto-open route panel on first stop
        if (count === 1) panel.classList.add('open');
    } else {
        badge.style.display = 'none';
        panel.classList.remove('open');
    }
};

// Search this area button
function searchArea() {
    const btn = document.getElementById('search-area-btn');
    if (btn) btn.style.display = 'none';
    if (window.fetchData) window.fetchData();
}
window.searchArea = searchArea;

// Re-wire search button display — map.js calls this when the map is panned
window.showSearchButton = function() {
    const btn = document.getElementById('search-area-btn');
    if (btn) btn.style.display = 'inline-flex';
};

// Tap-to-Call Selector logic
window.makePhoneCall = function(itemName, phoneFieldsJson) {
    const phoneFields = typeof phoneFieldsJson === 'string' ? JSON.parse(phoneFieldsJson) : phoneFieldsJson;
    if (!phoneFields || phoneFields.length === 0) return;

    if (phoneFields.length === 1) {
        // Strip out non-numeric characters for tel link, keeping optional leading plus
        const cleanNum = phoneFields[0].value.replace(/(?!^\+)[^\d]/g, '');
        window.location.href = 'tel:' + cleanNum;
        return;
    }

    // Multiple fields: show selector modal
    const overlay = document.getElementById('call-modal-overlay');
    const title = document.getElementById('call-modal-title');
    const body = document.getElementById('call-modal-body');

    title.textContent = `Call ${itemName}`;
    body.innerHTML = '';

    phoneFields.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'call-option-btn';
        const cleanNum = f.value.replace(/(?!^\+)[^\d]/g, '');
        btn.onclick = function() {
            window.location.href = 'tel:' + cleanNum;
            closeCallModal();
        };

        btn.innerHTML = `
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            <div style="flex:1;">
                <div style="font-size:0.72rem; color:#94a3b8; font-weight:500; margin-bottom:2px;">${f.label}</div>
                <div style="font-size:0.88rem; font-weight:600; color:#fff;">${f.value}</div>
            </div>
        `;
        body.appendChild(btn);
    });

    overlay.classList.add('open');
};

window.closeCallModal = function() {
    const overlay = document.getElementById('call-modal-overlay');
    if (overlay) overlay.classList.remove('open');
};

// Close modal when clicking outside the dialog content
document.addEventListener('DOMContentLoaded', () => {
    const overlay = document.getElementById('call-modal-overlay');
    if (overlay) {
        overlay.addEventListener('click', function(e) {
            if (e.target === this) {
                window.closeCallModal();
            }
        });
    }
});

// Sync all data
window.syncAllMyData = async function() {
    const toast = document.getElementById('sync-toast');
    toast.style.display = 'block';
    toast.style.color = '#94a3b8';
    toast.textContent = 'Syncing all data…';
    try {
        const res = await fetch('/api/sync-all', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
            toast.style.color = '#10b981';
            toast.textContent = `✓ Synced ${data.total_synced} records`;
            setTimeout(() => { toast.style.display = 'none'; window.location.reload(); }, 1800);
        } else {
            toast.style.color = '#ef4444';
            toast.textContent = `✗ ${data.error || 'Sync failed'}`;
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
    } catch(e) {
        toast.style.color = '#ef4444';
        toast.textContent = '✗ Network error';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
};
</script>

<script>
let googlePoiHidden = false;
window.toggleGooglePOIs = function() {
    if (!window.map) return;
    googlePoiHidden = !googlePoiHidden;
    const styles = googlePoiHidden ? [
        {
            featureType: "poi",
            elementType: "all",
            stylers: [{ visibility: "off" }]
        },
        {
            featureType: "transit",
            elementType: "all",
            stylers: [{ visibility: "off" }]
        }
    ] : [];
    
    window.map.setOptions({ styles: styles });
    
    const btn = document.getElementById('poi-toggle-btn');
    if (btn) {
        if (googlePoiHidden) {
            btn.classList.add('active');
            btn.title = "Show Points of Interest (POIs)";
        } else {
            btn.classList.remove('active');
            btn.title = "Hide Points of Interest (POIs)";
        }
    }
};

let currentMapType = 'roadmap';
window.toggleMapType = function() {
    if (!window.map) return;
    const btn = document.getElementById('map-type-btn');
    if (currentMapType === 'roadmap') {
        window.map.setMapTypeId('hybrid');
        currentMapType = 'hybrid';
        if (btn) {
            btn.classList.add('active');
            btn.title = "Switch to Map view";
        }
    } else {
        window.map.setMapTypeId('roadmap');
        currentMapType = 'roadmap';
        if (btn) {
            btn.classList.remove('active');
            btn.title = "Switch to Satellite view";
        }
    }
};
</script>
