{% extends "base.html" %}

{% block head %}
<script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
<script>
    const GOOGLE_MAPS_API_KEY = "{{ google_maps_api_key }}";
</script>
<script type="module" src="{{ url_for('static', filename='js/map.js') }}"></script>
{% endblock %}

{% block content %}
<div class="map-wrapper glass">
    <div class="map-sidebar">
        <div class="sidebar-header">
            <h2>Data Legend</h2>
            <div class="legend-stats" id="legend-stats">
                <span class="pulse-dot"></span> Loading data...
            </div>
        </div>
        <div class="legend-container" id="legend-container">
            <!-- Legend items will be injected here -->
        </div>
    </div>
    <div id="map" class="map-container"></div>
</div>

{% if show_console %}
<div class="debug-console" id="debug-console">
    <div class="console-header">
        <span>Server Output</span>
        <span class="pulse-dot" style="width:6px;height:6px;margin:0;"></span>
    </div>
    <div class="console-body" id="console-body">
        <div>Connected to logs...</div>
    </div>
</div>
<script>
    function pollLogs() {
        fetch('/api/logs')
            .then(r => r.json())
            .then(data => {
                if(data.logs && data.logs.length > 0) {
                    const cb = document.getElementById('console-body');
                    cb.innerHTML = '';
                    data.logs.forEach(line => {
                        const d = document.createElement('div');
                        d.textContent = line;
                        cb.appendChild(d);
                    });
                    cb.scrollTop = cb.scrollHeight;
                }
            })
            .catch(e => console.error(e));
    }
    setInterval(pollLogs, 1000);
    pollLogs();
</script>
{% endif %}

<script async defer src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap"></script>
{% endblock %}
