# /etc/nginx/sites-available/zohomap
# Symlink to /etc/nginx/sites-enabled/zohomap

server {
    listen 80;
    # Replace with your actual domain or IP address
    server_name zohomap.yourdomain.com;
    
    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    # Replace with your actual domain or IP address
    server_name zohomap.yourdomain.com;

    # SSL Configuration (using the certs generated by update.sh)
    ssl_certificate /var/www/zohomap/cert.pem;
    ssl_certificate_key /var/www/zohomap/key.pem;

    # Recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        # Proxy to Flask running locally on port 5000
        proxy_pass http://127.0.0.1:5000;
        
        # Crucial headers for Flask's ProxyFix to identify HTTPS
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if ever needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
