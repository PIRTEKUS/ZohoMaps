# /etc/nginx/sites-available/zohomap
# Symlink to /etc/nginx/sites-enabled/zohomap
#
# server_name is set to _ (catch-all) so the app is served on any IP or hostname.
# If you have a specific domain, replace _ with it (e.g. server_name yourdomain.com;)

server {
    listen 80 default_server;
    server_name _;

    # Health check endpoint for AWS Load Balancer — returns 200 without redirecting
    # The Load Balancer hits HTTP:80/health; all other traffic redirects to HTTPS
    location /health {
        proxy_pass http://unix:/var/www/zohomap/zohomap.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    server_name _;

    # SSL Configuration (using the certs generated by update.sh)
    ssl_certificate /var/www/zohomap/cert.pem;
    ssl_certificate_key /var/www/zohomap/key.pem;

    # Recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Allow custom marker image file uploads up to 100MB
    client_max_body_size 100M;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        # Proxy to Flask running via Gunicorn unix socket
        proxy_pass http://unix:/var/www/zohomap/zohomap.sock;

        # Crucial headers for Flask's ProxyFix to identify HTTPS
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if ever needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
