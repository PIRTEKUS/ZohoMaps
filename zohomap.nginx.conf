# /etc/nginx/sites-available/zohomap
# Works for both:
#   AWS: ALB terminates SSL, forwards HTTP to port 80 with X-Forwarded-Proto: https
#   Standalone: Nginx handles SSL directly on port 443
#
# Redirect logic on port 80:
#   - X-Forwarded-Proto = "https" (traffic from ALB/Cloudflare) → proxy to app, NO redirect
#   - X-Forwarded-Proto = ""      (direct HTTP connection on standalone) → redirect to HTTPS
# This prevents redirect loops when behind a load balancer.

server {
    listen 80 default_server;
    server_name _;

    # Health check for AWS Load Balancer — always proxy, never redirect
    location /health {
        proxy_pass http://unix:/var/www/zohomap/zohomap.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location / {
        # Only redirect to HTTPS if there is no upstream proxy header.
        # When behind ALB/Cloudflare: X-Forwarded-Proto = "https" → no redirect (prevents loop).
        # On standalone with direct HTTP: header is empty → redirect to HTTPS.
        if ($http_x_forwarded_proto = "") {
            return 301 https://$host$request_uri;
        }

        proxy_pass http://unix:/var/www/zohomap/zohomap.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl default_server;
    server_name _;

    # SSL Configuration — used by standalone servers only.
    # On AWS, SSL is terminated by the ALB and this block is not reached.
    ssl_certificate /var/www/zohomap/cert.pem;
    ssl_certificate_key /var/www/zohomap/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://unix:/var/www/zohomap/zohomap.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
